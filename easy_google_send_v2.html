<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>かんたん記録送信 完全版</title>
<style>
  :root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--primary:#2563eb;--green:#16a34a;--orange:#ea580c;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .wrap{max-width:760px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
  h1{font-size:22px;margin:0 0 10px}
  h2{font-size:18px;margin:0 0 10px}
  label{display:block;font-weight:700;margin:10px 0 6px}
  input,textarea,button{font:inherit}
  input,textarea{width:100%;padding:12px;border:1px solid #cfd5df;border-radius:12px;background:#fff}
  textarea{min-height:180px;resize:vertical}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  button{border:0;border-radius:12px;padding:13px 14px;color:#fff;font-weight:700;cursor:pointer}
  button:disabled{opacity:.6;cursor:not-allowed}
  .primary{background:var(--primary)} .green{background:var(--green)} .orange{background:var(--orange)} .ghost{background:#64748b}
  .status{white-space:pre-wrap;font-size:14px;color:var(--muted);margin-top:10px}
  .output{white-space:pre-wrap;line-height:1.6;background:#fbfbfd;border:1px solid var(--line);border-radius:12px;padding:14px;min-height:120px}
  .meta{font-size:12px;color:var(--muted);margin-top:8px}
  @media (max-width:640px){.row,.btns{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>かんたん記録送信 完全版</h1>
    <div class="meta">送信は自分の入力だけ。今日の記録確認は表示だけです。</div>
    <div class="row">
      <div>
        <label for="userName">利用者名</label>
        <input id="userName" list="recentUsers" placeholder="例：木村元子">
        <div style="margin:12px 0; padding:10px 12px; background:#f5f7fb; border:1px solid #d9e2f0; border-radius:8px; line-height:1.7;">
          <div style="font-weight:bold; margin-bottom:6px;">本日の記録の見方</div>
          <div>
            利用者名をフルネームで入力して、「本体の今日の記録を確認」を押してください。<br>
            他の項目は未記入で大丈夫です。<br>
            入力した利用者の本日の記録が表示されます。
          </div>
        </div>
        <datalist id="recentUsers"></datalist>
      </div>
      <div>
        <label for="staffName">記録者</label>
        <input id="staffName" list="recentStaff" placeholder="例：兵頭">
        <datalist id="recentStaff"></datalist>
      </div>
    </div>
    <label for="memoInput">本文</label>
    <textarea id="memoInput" placeholder="ここに自分の記録だけ入力してください"></textarea>
    <div class="btns">
      <button id="sendBtn" class="primary" type="button">一括作成して送信</button>
      <button id="checkBtn" class="green" type="button">本体の今日の記録を確認</button>
      <button id="copyBtn" class="orange" type="button">本文をコピー</button>
      <button id="clearBtn" class="ghost" type="button">本文を消す</button>
    </div>
    <div id="sendStatus" class="status"></div>
  </div>
  <div class="card">
    <h2>今日の記録</h2>
    <div id="checkStatus" class="status"></div>
    <div id="mainCheckBox" class="output">ここに今日の記録が表示されます。</div>
  </div>
</div>
<script>const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx2if_DzbHwI4bb1f3-493CiaMgA9ttqJVWTX10coubvD76VxnHEH4n5VkUzgNt-GSY/exec';
const RECENT_USERS_KEY = 'easy_recent_users_v2';
const RECENT_STAFF_KEY = 'easy_recent_staff_v2';
const DEFAULT_SOURCE = 'easy_v2_complete';

const userNameEl = document.getElementById('userName');
const staffNameEl = document.getElementById('staffName');
const memoInput = document.getElementById('memoInput');
const sendBtn = document.getElementById('sendBtn');
const checkBtn = document.getElementById('checkBtn');
const copyBtn = document.getElementById('copyBtn');
const clearBtn = document.getElementById('clearBtn');
const sendStatus = document.getElementById('sendStatus');
const checkStatus = document.getElementById('checkStatus');
const mainCheckBox = document.getElementById('mainCheckBox');
const recentUsers = document.getElementById('recentUsers');
const recentStaff = document.getElementById('recentStaff');

function todayYmd() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function normalizeText(text) {
  return String(text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/\n{3,}/g, '\n\n').trim();
}
function escapeHtml(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function loadRecent(key) {
  try {
    const v = JSON.parse(localStorage.getItem(key) || '[]');
    return Array.isArray(v) ? v.filter(Boolean) : [];
  } catch (e) {
    return [];
  }
}
function saveRecent(key, value) {
  const v = String(value || '').trim();
  if (!v) return;
  const arr = loadRecent(key).filter(x => x !== v);
  arr.unshift(v);
  localStorage.setItem(key, JSON.stringify(arr.slice(0, 20)));
}
function renderRecent() {
  if (recentUsers) recentUsers.innerHTML = loadRecent(RECENT_USERS_KEY).map(v => `<option value="${escapeHtml(v)}"></option>`).join('');
  if (recentStaff) recentStaff.innerHTML = loadRecent(RECENT_STAFF_KEY).map(v => `<option value="${escapeHtml(v)}"></option>`).join('');
}
async function fetchJson(url) {
  const res = await fetch(url, { cache: 'no-store' });
  const text = await res.text();
  let data = {};
  try { data = text ? JSON.parse(text) : {}; } catch (e) { data = { ok: false, rawText: text }; }
  if (!res.ok || data.ok === false) throw new Error(data.message || data.error || data.rawText || ('HTTP ' + res.status));
  return data;
}
async function postJson(payload) {
  const res = await fetch(WEB_APP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload),
    cache: 'no-store'
  });
  const text = await res.text();
  let data = {};
  try { data = text ? JSON.parse(text) : {}; } catch (e) { data = { ok: false, rawText: text }; }
  if (!res.ok || data.ok === false) throw new Error(data.message || data.error || data.rawText || ('HTTP ' + res.status));
  return data;
}
function buildPayload(text) {
  const user = String(userNameEl?.value || '').trim();
  const staff = String(staffNameEl?.value || '').trim();
  const date = todayYmd();
  const id = 'easy-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
  const raw = {
    id, serverId: id, _serverId: id,
    date, resident: user, recorder: staff,
    note: text, source: DEFAULT_SOURCE, createdFrom: 'easy_google_send_v2_complete'
  };
  return { action: 'saveBoth', id, serverId: id, _serverId: id, date, user, userName: user, staff, staffName: staff, text, body: text, source: DEFAULT_SOURCE, raw };
}
async function fetchMainRecord(user, date) {
  return fetchJson(`${WEB_APP_URL}?action=getMainRecord&user=${encodeURIComponent(user)}&date=${encodeURIComponent(date)}`);
}
async function fetchSharedRecords(user, date) {
  return fetchJson(`${WEB_APP_URL}?action=listShared&date=${encodeURIComponent(date)}&user=${encodeURIComponent(user)}`);
}
function renderMainRecord(data) {
  const rec = data && data.record ? data.record : null;
  const raw = rec && rec.raw && typeof rec.raw === 'object' ? rec.raw : {};
  let text = normalizeText((rec && (rec.text || raw.text || rec.note || raw.note)) || '');
  const staff = String((rec && rec.recorder) || raw.recorder || raw.staff || '').trim();
  if (!text) return false;
  if (staff && !text.includes('記録者 ' + staff) && !text.includes('【' + staff + '】')) {
    text = normalizeText(text + '\n記録者 ' + staff);
  }
  mainCheckBox.textContent = text;
  return true;
}
function renderSharedRecords(data) {
  const records = Array.isArray(data && data.records) ? data.records.slice() : [];
  if (!records.length) return false;
  records.sort((a, b) => String(a.updatedAt || a.timestamp || a.createdAt || '').localeCompare(String(b.updatedAt || b.timestamp || b.createdAt || '')));
  const parts = [];
  for (const rec of records) {
    const staff = String(rec.staff || rec.staffName || rec.recorder || '記録者不明').trim() || '記録者不明';
    const raw = rec && rec.raw && typeof rec.raw === 'object' ? rec.raw : {};
    const body = normalizeText(rec.text || rec.note || rec.body || raw.note || raw.text || raw.body || '');
    if (!body) continue;
    parts.push(body + '\n記録者 ' + staff);
  }
  const out = normalizeText(parts.join('\n\n'));
  if (!out) return false;
  mainCheckBox.textContent = out;
  return true;
}
async function checkMainRecord() {
  const user = String(userNameEl?.value || '').trim();
  const date = todayYmd();
  if (!user) {
    checkStatus.textContent = '利用者名を入力してください。';
    userNameEl?.focus();
    return;
  }
  checkBtn.disabled = true;
  checkStatus.textContent = '確認中です...';
  try {
    const main = await fetchMainRecord(user, date);
    if (renderMainRecord(main)) {
      checkStatus.textContent = '本体の今日の記録を表示しました。';
    } else {
      const shared = await fetchSharedRecords(user, date);
      if (renderSharedRecords(shared)) {
        checkStatus.textContent = '共有の今日の記録を表示しました。';
      } else {
        mainCheckBox.textContent = 'まだ今日の記録はありません。';
        checkStatus.textContent = 'まだ今日の記録はありません。';
      }
    }
  } catch (err) {
    checkStatus.textContent = '確認に失敗しました。\n' + (err && err.message ? err.message : err);
  } finally {
    checkBtn.disabled = false;
  }
}
async function sendRecord() {
  const user = String(userNameEl?.value || '').trim();
  const staff = String(staffNameEl?.value || '').trim();
  const text = normalizeText(memoInput?.value);
  if (!user) {
    sendStatus.textContent = '利用者名を入力してください。';
    userNameEl?.focus();
    return;
  }
  if (!staff) {
    sendStatus.textContent = '記録者名を入力してください。';
    staffNameEl?.focus();
    return;
  }
  if (!text) {
    sendStatus.textContent = '本文を入力してください。';
    memoInput?.focus();
    return;
  }
  sendBtn.disabled = true;
  checkBtn.disabled = true;
  sendStatus.textContent = '送信中です...';
  try {
    saveRecent(RECENT_USERS_KEY, user);
    saveRecent(RECENT_STAFF_KEY, staff);
    renderRecent();
    await postJson(buildPayload(text));
    if (memoInput) memoInput.value = '';
    sendStatus.textContent = '送信しました。';
    checkMainRecord();
  } catch (err) {
    sendStatus.textContent = '送信に失敗しました。\n' + (err && err.message ? err.message : err);
  } finally {
    sendBtn.disabled = false;
    checkBtn.disabled = false;
  }
}
async function copyText() {
  const text = normalizeText(memoInput?.value);
  if (!text) {
    sendStatus.textContent = '本文がありません。';
    return;
  }
  try {
    await navigator.clipboard.writeText(text);
    sendStatus.textContent = '本文をコピーしました。';
  } catch (e) {
    sendStatus.textContent = 'コピーに失敗しました。長押しでコピーしてください。';
  }
}
function clearMemo() {
  if (memoInput) memoInput.value = '';
  sendStatus.textContent = '本文を消しました。';
  memoInput?.focus();
}

sendBtn?.addEventListener('click', sendRecord);
checkBtn?.addEventListener('click', checkMainRecord);
copyBtn?.addEventListener('click', copyText);
clearBtn?.addEventListener('click', clearMemo);
renderRecent();</script>
</body>
</html>
