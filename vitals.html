<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8"/>
<title>バイタル記録（体重・血圧・脈拍）</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Yu Gothic UI", sans-serif;
      background: #f6f7fb;
      color: #0f172a;
    }
    a { color: #2563eb; text-decoration: none; }

    .topbar {
      position: sticky;
      top: 0;
      background: #ffffffcc;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 16px;
      z-index: 10;
    }
    .topbar-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .title {
      font-weight: 800;
      letter-spacing: .2px;
    }
    .subtitle {
      font-size: 12px;
      color: #475569;
      margin-top: 2px;
    }

    .wrap { max-width: 1100px; margin: 14px auto 24px; padding: 0 16px; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 520px;
      gap: 12px;
      align-items: start;
    }
    .layout > * { min-width: 0; }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(2,6,23,.04);

    }
    .card-title {
      font-weight: 800;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    label { display: block; font-size: 12px; color: #475569; margin: 0 0 6px; }
    input, select, textarea {
      width: 100%;
      padding: 10px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      background: #fff;

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .btn {

      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }
    .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .btn-danger { background: #ef4444; color: #fff; border-color: #ef4444; }
    .btn-ghost { background: #fff; color: #0f172a; }

    .hint { font-size: 12px; color: #475569; line-height: 1.45; }

    .tools {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .list { display: flex; flex-direction: column; gap: 10px; }
    .item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;

      background: #fff;
    }

      display: flex;

    }

    .pill {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      color: #334155;
      background: #f8fafc;

    .toast {
      position: fixed;
      left: 50%;

    /* 追加：グラフを大きく・縦に並べる */

    .table-wrap {

    @media print {

        margin: 0 0 8px;
        background: transparent;
      }
      .manual-flag-btn {
        display: none !important;

</style>

<script>
    // 共有キー（本体アプリと合わせる）
    const RESIDENTS_KEY = "group_home_residents_v1";
    const RECORDERS_KEY = "group_home_recorders_v1";
    const VITALS_KEY    = "group_home_vitals_v1";
    const GOOGLE_SHARE_URL_KEY = "group_home_google_share_url";
    const GOOGLE_SHARE_URL = 'https://script.google.com/macros/s/AKfycbySEqzNUSLOheYPJ-0l7zANNhiFnayaCbU1C_6hhfyyb5E5Mal31mblGqERVyKunSZB/exec';

    const DEFAULT_RESIDENTS = ['木村元子','河合真吾','荒川健二','山本浩二','原光恵','岩崎愛','河合志保'];
    const DEFAULT_RECORDERS = ['太田'];
    const VITALS_MANUAL_FLAGS_KEY = 'group_home_vitals_manual_flags_v1';

    const $ = (id) => document.getElementById(id);

    const toast = (msg) => {
      const el = $('toast');
      el.textContent = msg || '';
      el.classList.add('show');
      clearTimeout(window.__toastT);
      window.__toastT = setTimeout(() => el.classList.remove('show'), 1400);
    };

    const loadJSON = (key, fallback) => {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        const v = JSON.parse(raw);
        return v;
      } catch (e) {
        return fallback;
      }
    };
    const saveJSON = (key, value) => {
      localStorage.setItem(key, JSON.stringify(value));
    };


    function setRemoteStatus(msg) {
      const el = $('remoteStatus');
      if (el) el.textContent = msg || '';
    }

    function hasRemoteEnabled() {
      return !!GOOGLE_SHARE_URL;
    }

    function normalizeRemoteRecord(row) {
      if (!row || typeof row !== 'object') return null;
      const date = String(row.date || row.vDate || '').trim();
      const time = String(row.time || row.vTime || '').trim();
      const measuredAt = row.measuredAt || ((date && time) ? buildMeasuredAt(date, time) : '');
      const id = String(row.id || row._id || '').trim() || (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + '_' + Math.random().toString(16).slice(2));
      return {
        id,
        resident: String(row.resident || row.user || '').trim(),
        recorder: String(row.recorder || row.staff || '').trim(),
        measuredAt,
        weight: String(row.weight ?? '').trim(),
        bpSys: String(row.bpSys ?? row.bpHigh ?? '').trim(),
        bpDia: String(row.bpDia ?? row.bpLow ?? '').trim(),
        pulse: String(row.pulse ?? '').trim(),
        memo: String(row.memo ?? '').trim(),
      };
    }

    function mergeVitalsById(localList, remoteList) {
      const map = new Map();
      for (const item of Array.isArray(localList) ? localList : []) {
        if (!item || !item.id) continue;
        map.set(item.id, item);
      }
      for (const item of Array.isArray(remoteList) ? remoteList : []) {
        if (!item || !item.id) continue;
        map.set(item.id, item);
      }
      return Array.from(map.values()).sort((a,b) => (a.measuredAt || '').localeCompare(b.measuredAt || ''));
    }

    async function remoteGet(params) {
      const url = GOOGLE_SHARE_URL + '?' + new URLSearchParams(params).toString();
      const res = await fetch(url, { cache: 'no-store' });
      const json = await res.json();
      if (!json || !json.ok) throw new Error((json && (json.message || json.error)) || '共有読込に失敗しました');
      return json;
    }

    async function remotePost(params) {
      const res = await fetch(GOOGLE_SHARE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
        body: new URLSearchParams(params).toString(),
      });
      const json = await res.json();
      if (!json || !json.ok) throw new Error((json && (json.message || json.error)) || '共有保存に失敗しました');
      return json;
    }

    async function saveVitalRemote(entry) {
      if (!hasRemoteEnabled()) return { ok:false, skipped:true };
      const d = new Date(entry.measuredAt);
      return remotePost({
        action: 'saveVitalRecord',
        id: entry.id || '',
        date: `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`,
        time: `${pad2(d.getHours())}:${pad2(d.getMinutes())}`,
        user: entry.resident || '',
        staff: entry.recorder || '',
        weight: entry.weight || '',
        bpSys: entry.bpSys || '',
        bpDia: entry.bpDia || '',
        pulse: entry.pulse || '',
        memo: entry.memo || '',
        measuredAt: entry.measuredAt || '',
      });
    }

    async function deleteVitalRemote(id) {
      if (!hasRemoteEnabled()) return { ok:false, skipped:true };
      return remotePost({ action: 'deleteVitalRecord', id: id || '' });
    }

    async function syncRemoteVitals(options = {}) {
      if (!hasRemoteEnabled()) {
        setRemoteStatus('共有URL未設定のため、この端末内保存のみです');
        if (!options.silent) toast('共有URLが未設定です');
        return [];
      }
      setRemoteStatus('共有読込中…');
      const json = await remoteGet({ action: 'getVitalRecords' });
      const remoteList = (Array.isArray(json.records) ? json.records : []).map(normalizeRemoteRecord).filter(Boolean);
      const merged = mergeVitalsById(loadVitals(), remoteList);
      saveVitals(merged);
      setRemoteStatus(`共有接続OK：${remoteList.length}件読込`);
      if (!options.silent) toast('共有読込しました');
      return remoteList;
    }

    async function migrateLocalVitalsToRemote() {
      if (!hasRemoteEnabled()) {
        setRemoteStatus('共有URL未設定のため、この端末内保存のみです');
        toast('共有URLが未設定です');
        return;
      }
      const localList = loadVitals().filter(v => v && v.id && v.measuredAt);
      if (localList.length === 0) {
        toast('送るデータがありません');
        setRemoteStatus('送るデータがありません');
        return;
      }
      const ok = confirm(`この端末の過去データ ${localList.length}件 を共有へ送ります。\n\n同じIDのものは上書きされます。続けますか？`);
      if (!ok) return;

      let success = 0;
      let failed = 0;
      for (let i = 0; i < localList.length; i++) {
        const item = localList[i];
        setRemoteStatus(`共有へ送信中… ${i + 1}/${localList.length}`);
        try {
          await saveVitalRemote(item);
          success++;
        } catch (e) {
          console.warn('migrate remote failed', item, e);
          failed++;
        }
      }

      try {
        await syncRemoteVitals({ silent:true });
      } catch (e) {
        console.warn('post migrate sync failed', e);
      }
      renderList();

      const d = new Date(y, (m-1), da, h, mi, 0, 0);

    function averageOf(values, digits = 1) {
      const nums = values.map(parseNumOrNull).filter(v => v != null);
      if (!nums.length) return null;
      const avg = nums.reduce((a, b) => a + b, 0) / nums.length;

    function getFilterRange() {
      const mode = $('filterRange').value;
      const now = new Date();
      const end = now.getTime();
      let start = 0;
      if (mode === 'today') {
        const d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0,0,0,0);
        start = d.getTime();
      } else if (mode === 'week') {
        start = end - 7*24*60*60*1000;
      } else if (mode === 'month') {
        const d = new Date(now.getFullYear(), now.getMonth(), 1, 0,0,0,0);
        start = d.getTime();
      } else {
        start = 0;
      }
      return { start, end };
    }

    function dayKeyFromISO(iso) {
      const d = new Date(iso);
      return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    }

    function shortLabelFromISO(iso) {
      const d = new Date(iso);
      return `${pad2(d.getMonth()+1)}/${pad2(d.getDate())}`;

    function groupByDayLastMetrics(records) {
      // records: measuredAt ASC recommended
      const map = new Map();
      for (const v of records) {
        const iso = v.measuredAt;
        if (!iso) continue;
        const k = dayKeyFromISO(iso);
        let cur = map.get(k);
        if (!cur) {
          cur = { day: k, label: shortLabelFromISO(iso), lastISO: iso, weight: null, bpSys: null, bpDia: null, pulse: null };
          map.set(k, cur);
        }
        // keep latest ISO for label positioning
        if (String(iso).localeCompare(String(cur.lastISO)) > 0) {
          cur.lastISO = iso;
          cur.label = shortLabelFromISO(iso);
        }
        const w = parseNumOrNull(v.weight);
        const s = parseNumOrNull(v.bpSys);
        const d = parseNumOrNull(v.bpDia);
        const p = parseNumOrNull(v.pulse);
        if (w != null) cur.weight = w;
        if (s != null) cur.bpSys = s;
        if (d != null) cur.bpDia = d;
        if (p != null) cur.pulse = p;
      }
      const days = Array.from(map.values()).sort((a,b) => a.day.localeCompare(b.day));
      return days;
    }

    function sizeCanvasToCSS(canvas) {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.floor(rect.width * dpr));
      const h = Math.max(1, Math.floor(rect.height * dpr));
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
      }
      return { cssW: rect.width, cssH: rect.height, dpr };
    }

    function drawLineChart(canvas, labels, series, opts) {
      const ctx = canvas.getContext('2d');
      const { cssW, cssH, dpr } = sizeCanvasToCSS(canvas);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.clearRect(0,0,cssW,cssH);

      const padL = 46, padR = 10, padT = 10, padB = 30;
      const innerW = Math.max(10, cssW - padL - padR);
      const innerH = Math.max(10, cssH - padT - padB);

      // collect y values
      const ys = [];
      for (const s of series) {
        for (const y of s.y) if (y != null) ys.push(y);
      }
      if (labels.length < 1 || ys.length === 0) {
        // empty
        ctx.fillStyle = '#475569';
        ctx.font = '12px system-ui, -apple-system, Segoe UI, Roboto, Noto Sans JP, Yu Gothic UI, sans-serif';
        ctx.fillText('データがありません（期間/利用者を切り替えてください）', 12, 22);
        return;
      }

      let yMin = Math.min(...ys);
      let yMax = Math.max(...ys);
      if (!Number.isFinite(yMin) || !Number.isFinite(yMax)) return;
      if (yMin === yMax) {
        yMin -= 1;
        yMax += 1;
      } else {
        const pad = (yMax - yMin) * 0.08;
        yMin -= pad;
        yMax += pad;
      }

      const xCount = labels.length;
      const xAt = (i) => padL + (xCount === 1 ? 0 : (i * innerW / (xCount - 1)));
      const yAt = (v) => padT + (yMax - v) * innerH / (yMax - yMin);

      // grid
      ctx.strokeStyle = '#e5e7eb';
      ctx.lineWidth = 1;
      const gridN = 4;
      for (let g=0; g<=gridN; g++) {
        const y = padT + innerH * (g / gridN);
        ctx.beginPath();
        ctx.moveTo(padL, y);
        ctx.lineTo(padL + innerW, y);
        ctx.stroke();
      }

      // y labels
      ctx.fillStyle = '#475569';
      ctx.font = '12px system-ui, -apple-system, Segoe UI, Roboto, Noto Sans JP, Yu Gothic UI, sans-serif';
      for (let g=0; g<=gridN; g++) {
        const v = yMax - (yMax - yMin) * (g / gridN);
        const y = padT + innerH * (g / gridN);
        ctx.fillText((opts && opts.yFmt ? opts.yFmt(v) : String(Math.round(v))), 6, y + 4);
      }

      // x labels (few ticks)
      const ticks = []
      if (xCount <= 6) {
        for (let i=0;i<xCount;i++) ticks.push(i);
      } else {
        ticks.push(0);
        ticks.push(Math.floor((xCount-1)*0.25));
        ticks.push(Math.floor((xCount-1)*0.5));
        ticks.push(Math.floor((xCount-1)*0.75));
        ticks.push(xCount-1);
      }
      const uniqTicks = Array.from(new Set(ticks)).sort((a,b)=>a-b);
      for (const i of uniqTicks) {
        const x = xAt(i);
        const txt = labels[i] || '';
        ctx.fillText(txt, Math.min(cssW-28, Math.max(0, x-12)), padT + innerH + 22);
      }

      // series lines
      for (const s of series) {
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        let started = false;
        for (let i=0;i<xCount;i++) {
          const yv = s.y[i];
          if (yv == null) {
            started = false;
            continue;
          }
          const x = xAt(i);
          const y = yAt(yv);
          if (!started) {
            ctx.moveTo(x,y);
            started = true;
          } else {
            ctx.lineTo(x,y);
          }
        }
        ctx.stroke();

        // points
        ctx.fillStyle = s.color;
        for (let i=0;i<xCount;i++) {
          const yv = s.y[i];
          if (yv == null) continue;
          const x = xAt(i);
          const y = yAt(yv);
          ctx.beginPath();
          ctx.arc(x, y, 3, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }

    async function applyEdit() {
      if (!editingId) return;
      const all = loadVitals();
      const idx = all.findIndex(x => x.id === editingId);
      if (idx < 0) return;

      const date = $('eDate').value;
      const time = $('eTime').value;
      if (!date || !time) { toast('日付と時刻を入力してください'); return; }

      all[idx] = {
        ...all[idx],
        resident: $('eResident').value || '',
        recorder: $('eRecorder').value || '',
        measuredAt: buildMeasuredAt(date, time),
        weight: String($('eWeight').value || '').trim(),
        bpSys: String($('eBpSys').value || '').trim(),
        bpDia: String($('eBpDia').value || '').trim(),
        pulse: String($('ePulse').value || '').trim(),
        memo: String($('eMemo').value || '').trim(),
      };

      saveVitals(all);
      let msg = '更新しました';
      if (hasRemoteEnabled()) {
        try {
          await saveVitalRemote(all[idx]);
          setRemoteStatus('共有接続OK：更新しました');
          msg = '更新しました（共有OK）';
        } catch (e) {
          console.warn('update remote failed', e);
          setRemoteStatus('共有更新に失敗しました');
          msg = '端末で更新しました（共有失敗）';
        }
      }
      toast(msg);
      closeEdit();
      renderList();
    }

    async function deleteEdit() {
      if (!editingId) return;
      const ok = confirm('このバイタル記録を削除しますか？');
      if (!ok) return;
      const deletingId = editingId;
      const all = loadVitals().filter(x => x.id !== deletingId);
      saveVitals(all);
      let msg = '削除しました';
      if (hasRemoteEnabled()) {
        try {
          await deleteVitalRemote(deletingId);
          setRemoteStatus('共有接続OK：削除しました');
          msg = '削除しました（共有OK）';
        } catch (e) {
          console.warn('delete remote failed', e);
          setRemoteStatus('共有削除に失敗しました');
          msg = '端末で削除しました（共有失敗）';
        }
      }
      toast(msg);
      closeEdit();
      renderList();
    }

    // --- CSV / バックアップ / 復元（このページ単体） ---
    function yyyymmdd_hhmmss(){
      const d = new Date();
      return `${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}_${pad2(d.getHours())}${pad2(d.getMinutes())}${pad2(d.getSeconds())}`;
    }

    function downloadTextFile(filename, text, mime){
      const blob = new Blob([text], {type: mime || 'text/plain'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=>URL.revokeObjectURL(url), 3000);
    }

    function exportCsv(){
      const rows = [
        ['measuredAt','resident','recorder','weight','bpSys','bpDia','pulse','memo']
      ];
      for (const v of loadVitals()) {
        rows.push([
          v.measuredAt||'', v.resident||'', v.recorder||'', v.weight||'', v.bpSys||'', v.bpDia||'', v.pulse||'', (v.memo||'').replace(/\r?\n/g,' ')
        ]);
      }
      const csv = rows.map(r => r.map(cell => {
        const s = String(cell ?? '');
        if (/[\",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
        return s;
      }).join(',')).join('\n');
      downloadTextFile(`vitals_${yyyymmdd_hhmmss()}.csv`, csv, 'text/csv');
      toast('CSVを保存しました');
    }

    function backupVitals(){
      const payload = {
        app: 'group_home_vitals',
        schemaVersion: 1,
        exportedAt: new Date().toISOString(),
        vitals: loadVitals(),
      };
      downloadTextFile(`vitals_backup_${yyyymmdd_hhmmss()}.json`, JSON.stringify(payload, null, 2), 'application/json');
      toast('バックアップを保存しました');
    }

    function normalizeVitalsBackup(parsed){
      if (parsed && parsed.vitals && Array.isArray(parsed.vitals)) return parsed.vitals;
      if (Array.isArray(parsed)) return parsed;
      return null;
    }

    function restoreVitalsFile(file){
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result||''));
          const vitals = normalizeVitalsBackup(parsed);
          if (!vitals) { alert('このファイルはバイタル復元用として認識できませんでした'); return; }
          const ok = confirm(`復元しますか？\n\n現在：${loadVitals().length}件\n復元：${vitals.length}件\n\n※現在のバイタルは上書きされます。`);
          if (!ok) return;
          saveVitals(Array.isArray(vitals)?vitals:[]);
          toast('復元しました');
          if (hasRemoteEnabled()) {
        setRemoteStatus('共有URL設定済み：起動時に共有を確認します');
        syncRemoteVitals({ silent:true }).then(() => renderList()).catch((e) => { console.warn('initial remote sync failed', e); setRemoteStatus('共有読込に失敗しました'); });
      } else {
        setRemoteStatus('共有URL未設定のため、この端末内保存のみです');
      }

      renderList();

      window.addEventListener('resize', () => {
        // resize charts for new width
        try { renderCharts(); } catch(e) {}
      });
        } catch (e) {
          alert('復元に失敗しました：' + (e?.message || e));
        }
      };
      reader.readAsText(file);
    }

    // --- 初期化 ---
    function init(){
      $('vDate').value = nowLocalDate();
      $('vTime').value = nowLocalTime();

      const residents = loadJSON(RESIDENTS_KEY, []);
      const recorders = loadJSON(RECORDERS_KEY, []);
      const residentList = Array.isArray(residents) && residents.length ? residents : DEFAULT_RESIDENTS;
      const recorderList = Array.isArray(recorders) && recorders.length ? recorders : DEFAULT_RECORDERS;

      buildResidentsSelect($('vResident'), residentList, false);
      buildRecordersSelect($('vRecorder'), recorderList);
      buildResidentsSelect($('filterResident'), residentList, true);

      // filterResident: なるべく「最後に使った利用者」へ（グラフが見やすい）
      $('filterResident').value = '__all__';

      // 編集モーダル側
      buildResidentsSelect($('eResident'), residentList, false);
      buildRecordersSelect($('eRecorder'), recorderList);

      // 設定の復元（最後に使った利用者/記録者）
      try {
        const last = loadJSON('group_home_vitals_last_v1', {});
        if (last && typeof last === 'object') {
          if (last.resident && Array.from($('vResident').options).some(o=>o.value===last.resident)) $('vResident').value = last.resident;
          if (last.recorder && Array.from($('vRecorder').options).some(o=>o.value===last.recorder)) $('vRecorder').value = last.recorder;
        }
      } catch(e){}

      // 一覧は初期表示を全員にする
      $('filterResident').value = '__all__';

      $('saveVitalBtn').onclick = async () => {
        try { saveJSON('group_home_vitals_last_v1', { resident: $('vResident').value, recorder: $('vRecorder').value }); } catch(e){}
        await saveDraftToVitals();
      };
      $('clearBtn').onclick = clearInputs;
      $('copyBtn').onclick = () => {
        const d = getCurrentDraft();
        const v = { weight:d.weight, bpSys:d.bpSys, bpDia:d.bpDia, pulse:d.pulse, memo:d.memo };
        const txt = vitalsToText(v);
        navigator.clipboard?.writeText(txt).then(() => toast('コピーしました')).catch(()=>{ fallbackCopy(txt); toast('コピーしました'); });
      };

      $('filterResident').onchange = renderList;
      $('filterRange').onchange = renderList;
      $('search').oninput = renderList;

      $('syncRemoteBtn').onclick = async () => { try { await syncRemoteVitals(); renderList(); } catch(e){ console.warn(e); setRemoteStatus('共有読込に失敗しました'); toast('共有読込に失敗しました'); } };
      $('migrateRemoteBtn').onclick = async () => { try { await migrateLocalVitalsToRemote(); } catch(e){ console.warn(e); setRemoteStatus('共有送信に失敗しました'); toast('共有送信に失敗しました'); } };
      $('closeModalBtn').onclick = closeEdit;
      $('modalBg').addEventListener('click', (e) => { if (e.target === $('modalBg')) closeEdit(); });
      $('saveEditBtn').onclick = applyEdit;
      $('deleteEditBtn').onclick = deleteEdit;

      const printBtn = $('printBtn');
      if (printBtn) printBtn.onclick = () => window.print();
      $('exportCsvBtn').onclick = exportCsv;
      $('backupVitalsBtn').onclick = backupVitals;
      $('restoreVitalsBtn').onclick = () => $('restoreVitalsFile').click();
      $('restoreVitalsFile').addEventListener('change', (e) => restoreVitalsFile(e.target.files?.[0]));

      if (hasRemoteEnabled()) {
        setRemoteStatus('共有URL設定済み：起動時に共有を確認します');
        syncRemoteVitals({ silent:true }).then(() => renderList()).catch((e) => { console.warn('initial remote sync failed', e); setRemoteStatus('共有読込に失敗しました'); });
      } else {
        setRemoteStatus('共有URL未設定のため、この端末内保存のみです');
      }

      renderList();

      window.addEventListener('resize', () => {
        // resize charts for new width
        try { renderCharts(); } catch(e) {}
      });

      // 注意表示
      if (!Array.isArray(residents) || residents.length==0) {
        $('quickStatus').textContent = '※初期利用者を表示しています。本体で登録済みならそちらが優先されます。';
      }
    }

  
    document.addEventListener('DOMContentLoaded', init);

  </script>
