<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>かんたん記録ページ</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --line:#d8e0eb;
      --text:#1f2937;
      --sub:#6b7280;
      --primary:#2563eb;
      --primary2:#1d4ed8;
      --green:#16a34a;
      --green2:#15803d;
      --orange:#ea580c;
      --orange2:#c2410c;
      --shadow:0 8px 24px rgba(0,0,0,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    }
    .wrap{max-width:840px;margin:0 auto;padding:16px}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }
    h1{margin:0 0 6px;font-size:28px;line-height:1.3}
    h2{margin:0 0 12px;font-size:21px;line-height:1.4}
    .sub{color:var(--sub);font-size:14px}
    .grid{display:grid;gap:14px}
    @media(min-width:720px){.grid.two{grid-template-columns:1fr 1fr}}
    label{display:block;font-size:15px;font-weight:700;margin-bottom:8px}
    input,textarea,button{font:inherit}
    input,textarea{
      width:100%;
      border:2px solid var(--line);
      border-radius:14px;
      padding:14px;
      background:#fff;
      color:var(--text);
    }
    input:focus,textarea:focus{outline:none;border-color:var(--primary)}
    textarea{min-height:220px;resize:vertical}
    .btns{display:grid;gap:12px}
    @media(min-width:720px){.btns.two{grid-template-columns:1fr 1fr}}
    button{
      min-height:56px;
      border:none;
      border-radius:14px;
      font-weight:700;
      color:#fff;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    button:active{transform:scale(.99)}
    .btn-primary{background:var(--primary)}
    .btn-primary:hover{background:var(--primary2)}
    .btn-green{background:var(--green)}
    .btn-green:hover{background:var(--green2)}
    .btn-orange{background:var(--orange)}
    .btn-orange:hover{background:var(--orange2)}
    .status{white-space:pre-wrap;color:var(--sub);font-size:14px;min-height:22px;margin-top:10px}
    .output{
      white-space:pre-wrap;
      border:2px solid var(--line);
      border-radius:14px;
      background:#f8fafc;
      padding:14px;
      min-height:110px;
      font-size:16px;
    }
    .muted{color:var(--sub);font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>かんたん記録ページ</h1>
      <div class="sub">軽い安定版です。Google共有と本体記録を一括保存します。</div>
    </section>

    <section class="card">
      <h2>基本情報</h2>
      <div class="grid two">
        <div>
          <label for="userName">利用者名</label>
          <input id="userName" list="recentUsers" placeholder="利用者名を入力">
          <datalist id="recentUsers"></datalist>
        </div>
        <div>
          <label for="staffName">記録者名</label>
          <input id="staffName" list="recentStaff" placeholder="記録者名を入力">
          <datalist id="recentStaff"></datalist>
        </div>
      </div>
      <div class="muted" style="margin-top:10px">最近使った利用者名・記録者名は候補に残ります。</div>
    </section>

    <section class="card">
      <h2>業務日誌記入欄</h2>
      <label for="memoInput">本文</label>
      <textarea id="memoInput" placeholder="ここに記録本文を入力してください"></textarea>
      <div class="btns two" style="margin-top:14px">
        <button id="sendBtn" class="btn-primary" type="button">一括作成して送信</button>
        <button id="copyBtn" class="btn-orange" type="button">本文をコピー</button>
      </div>
      <div id="sendStatus" class="status"></div>
      <div class="muted">送信先URL: <span id="urlText"></span></div>
    </section>

    <section class="card">
      <h2>今日の記録を確認</h2>
      <div class="btns two">
        <button id="checkBtn" class="btn-green" type="button">今日の記録を確認</button>
        <button id="clearBtn" class="btn-orange" type="button">本文を消す</button>
      </div>
      <div id="checkStatus" class="status"></div>
      <div id="mainCheckBox" class="output">ここに今日の記録が表示されます。</div>
    </section>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx2if_DzbHwI4bb1f3-493CiaMgA9ttqJVWTX10coubvD76VxnHEH4n5VkUzgNt-GSY/exec";
    const RECENT_USERS_KEY = "easy_recent_users_v2";
    const RECENT_STAFF_KEY = "easy_recent_staff_v2";
    const DEFAULT_SOURCE = "easy_v2_clean";

    const userNameEl = document.getElementById("userName");
    const staffNameEl = document.getElementById("staffName");
    const memoInput = document.getElementById("memoInput");
    const sendBtn = document.getElementById("sendBtn");
    const copyBtn = document.getElementById("copyBtn");
    const checkBtn = document.getElementById("checkBtn");
    const clearBtn = document.getElementById("clearBtn");
    const sendStatus = document.getElementById("sendStatus");
    const checkStatus = document.getElementById("checkStatus");
    const mainCheckBox = document.getElementById("mainCheckBox");
    const recentUsers = document.getElementById("recentUsers");
    const recentStaff = document.getElementById("recentStaff");
    document.getElementById("urlText").textContent = WEB_APP_URL;

    function getTodayYmd() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function normalizeText(text) {
      return String(text || "")
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function getUserName() {
      return String(userNameEl.value || "").trim();
    }

    function getStaffName() {
      return String(staffNameEl.value || "").trim();
    }

    function loadRecent(key) {
      try {
        const arr = JSON.parse(localStorage.getItem(key) || "[]");
        return Array.isArray(arr) ? arr.filter(Boolean) : [];
      } catch (_) {
        return [];
      }
    }

    function saveRecent(key, value) {
      const v = String(value || "").trim();
      if (!v) return;
      const current = loadRecent(key).filter(x => x !== v);
      current.unshift(v);
      localStorage.setItem(key, JSON.stringify(current.slice(0, 20)));
    }

    function renderRecent() {
      recentUsers.innerHTML = loadRecent(RECENT_USERS_KEY)
        .map(v => `<option value="${escapeHtml(v)}"></option>`)
        .join("");
      recentStaff.innerHTML = loadRecent(RECENT_STAFF_KEY)
        .map(v => `<option value="${escapeHtml(v)}"></option>`)
        .join("");
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function postJson(payload) {
      const res = await fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
        cache: "no-store"
      });

      const text = await res.text();
      let json = {};

      try {
        json = text ? JSON.parse(text) : {};
      } catch (_) {
        json = { ok: res.ok, rawText: text };
      }

      if (!res.ok) {
        throw new Error(json.message || json.rawText || `HTTP ${res.status}`);
      }

      if (json && json.ok === false) {
        throw new Error(json.message || json.rawText || "保存に失敗しました。");
      }

      return json;
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      const text = await res.text();
      let json = {};

      try {
        json = text ? JSON.parse(text) : {};
      } catch (_) {
        json = { ok: false, rawText: text };
      }

      if (!res.ok) {
        throw new Error(json.message || json.rawText || `HTTP ${res.status}`);
      }

      if (json && json.ok === false) {
        throw new Error(json.message || json.rawText || "取得に失敗しました。");
      }

      return json;
    }

    function buildPayload(text) {
      const user = getUserName();
      const staff = getStaffName();
      const date = getTodayYmd();
      const id = `easy-${Date.now()}-${Math.random().toString(36).slice(2,8)}`;

      const raw = {
        id,
        serverId: id,
        _serverId: id,
        date,
        resident: user,
        recorder: staff,
        note: text,
        source: DEFAULT_SOURCE,
        createdFrom: "easy_google_send_v2_clean"
      };

      return {
        action: "saveBoth",
        id,
        serverId: id,
        _serverId: id,
        date,
        user,
        userName: user,
        staff,
        staffName: staff,
        text,
        body: text,
        source: DEFAULT_SOURCE,
        raw
      };
    }

    async function fetchMainRecord(user, date) {
      const url = `${WEB_APP_URL}?action=getMainRecord&user=${encodeURIComponent(user)}&date=${encodeURIComponent(date)}`;
      return await fetchJson(url);
    }

    async function fetchSharedRecords(user, date) {
      const url = `${WEB_APP_URL}?action=listShared&date=${encodeURIComponent(date)}&user=${encodeURIComponent(user)}`;
      return await fetchJson(url);
    }

    function getRecordText(rec) {
      return normalizeText(
        (rec && rec.text) ||
        (rec && rec.note) ||
        (rec && rec.raw && (rec.raw.note || rec.raw.text)) ||
        ""
      );
    }

    function formatEntryBlock(rec) {
      const recorder = String(
        (rec && (rec.recorder || rec.staff || rec.user)) ||
        (rec && rec.raw && (rec.raw.recorder || rec.raw.staff)) ||
        '記録者不明'
      ).trim() || '記録者不明';
      const body = getRecordText(rec);
      return body ? `【${recorder}】\n${body}` : `【${recorder}】`;
    }

    function renderMainRecord(mainData, sharedData) {
      const rec = mainData && mainData.record ? mainData.record : null;
      const mainText = getRecordText(rec);
      if (mainText) {
        mainCheckBox.textContent = mainText;
        return;
      }

      const items = Array.isArray(sharedData && sharedData.records) ? sharedData.records : [];
      const blocks = items.map(formatEntryBlock).filter(Boolean);
      if (!blocks.length) {
        mainCheckBox.textContent = "まだ今日の記録はありません。";
        return;
      }
      mainCheckBox.textContent = blocks.join("\n\n");
    }

    async function pollMainRecord(user, date, expectedText) {
      for (let i = 0; i < 8; i++) {
        const data = await fetchMainRecord(user, date);
        const text = normalizeText(data && data.record && data.record.text);
        if (text && (!expectedText || text.includes(expectedText))) return data;
        await new Promise(r => setTimeout(r, 700));
      }
      return await fetchMainRecord(user, date);
    }

    async function sendRecord() {
      const user = getUserName();
      const staff = getStaffName();
      const text = normalizeText(memoInput.value);
      const date = getTodayYmd();

      if (!user) {
        sendStatus.textContent = "利用者名を入力してください。";
        userNameEl.focus();
        return;
      }
      if (!staff) {
        sendStatus.textContent = "記録者名を入力してください。";
        staffNameEl.focus();
        return;
      }
      if (!text) {
        sendStatus.textContent = "本文を入力してください。";
        memoInput.focus();
        return;
      }

      sendBtn.disabled = true;
      checkBtn.disabled = true;
      sendStatus.textContent = "送信中です...";

      try {
        saveRecent(RECENT_USERS_KEY, user);
        saveRecent(RECENT_STAFF_KEY, staff);
        renderRecent();

        const payload = buildPayload(text);
        await postJson(payload);

        const [mainResult, sharedResult] = await Promise.all([
          pollMainRecord(user, date, text).catch(() => null),
          fetchSharedRecords(user, date).catch(() => null)
        ]);

        renderMainRecord(mainResult, sharedResult);

        const mainText = normalizeText(mainResult && mainResult.record && mainResult.record.text);
        if (mainText && mainText.includes(text)) {
          sendStatus.textContent = `送信しました。\n本体にも反映できました。\n利用者: ${user}`;
        } else {
          sendStatus.textContent = `送信しました。\n今日の記録を表示しました。\n利用者: ${user}\n本体反映は少し遅れる場合があります。`;
        }
      } catch (err) {
        sendStatus.textContent = `送信に失敗しました。\n${err && err.message ? err.message : err}`;
      } finally {
        sendBtn.disabled = false;
        checkBtn.disabled = false;
      }
    }

    async function checkMainRecord() {
      const user = getUserName();
      const date = getTodayYmd();

      if (!user) {
        checkStatus.textContent = "利用者名を入力してください。";
        userNameEl.focus();
        return;
      }

      checkBtn.disabled = true;
      checkStatus.textContent = "確認中です...";

      try {
        const [mainData, sharedData] = await Promise.all([
          fetchMainRecord(user, date).catch(() => null),
          fetchSharedRecords(user, date).catch(() => null)
        ]);
        renderMainRecord(mainData, sharedData);
        checkStatus.textContent = "確認しました。";
      } catch (err) {
        checkStatus.textContent = `確認に失敗しました。\n${err && err.message ? err.message : err}`;
      } finally {
        checkBtn.disabled = false;
      }
    }

    async function copyText() {
      const text = normalizeText(memoInput.value);
      if (!text) {
        sendStatus.textContent = "本文がありません。";
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        sendStatus.textContent = "本文をコピーしました。";
      } catch (_) {
        sendStatus.textContent = "コピーに失敗しました。長押しでコピーしてください。";
      }
    }

    function clearMemo() {
      memoInput.value = "";
      sendStatus.textContent = "本文を消しました。";
    }

    sendBtn.addEventListener("click", sendRecord);
    checkBtn.addEventListener("click", checkMainRecord);
    copyBtn.addEventListener("click", copyText);
    clearBtn.addEventListener("click", clearMemo);
    renderRecent();
  </script>
</body>
</html>
